<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grey Henry — Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#2A3431;--forest:#1C2420;--gold:#BFB178;--antique:#8F7F48;--parchment:#E8DFCB;--ivory:#F4EEE1;--line:rgba(191,177,120,.28);--serif:'Playfair Display',Georgia,serif;--sans:'Jost',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);background:#15201d;color:var(--ivory);display:flex;align-items:center;justify-content:center;min-height:100vh;background-image:radial-gradient(120% 80% at 50% -10%,#26312d 0%,#15201d 60%);padding:24px 12px}
.framewrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.device{position:relative;width:420px;max-width:100%;height:860px;max-height:92vh;background:var(--green);border-radius:38px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.7),0 0 0 1px rgba(191,177,120,.18),0 0 0 10px #11181699}
.app{position:absolute;inset:0;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
.screen::-webkit-scrollbar{width:0}
.webnote{font-family:var(--sans);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#7d8a82}
svg{display:block}
.pad{padding:0 22px}
.muted{color:#9aa69d;font-size:13px;font-weight:300;line-height:1.6}
.eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:400}
.serif{font-family:var(--serif)}
.sprig{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gold);opacity:.85;margin:0 auto}
.sprig::before,.sprig::after{content:"";height:1px;width:46px;background:linear-gradient(90deg,transparent,var(--gold))}
.sprig::after{background:linear-gradient(90deg,var(--gold),transparent)}
.sprig span{font-size:11px;letter-spacing:.3em}
.btn{font-family:var(--sans);cursor:pointer;border:none;border-radius:999px;padding:14px 22px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;transition:.2s}
.btn-gold{background:var(--gold);color:var(--forest);font-weight:500}
.btn-gold:hover{background:#cdc08c}
.outbtn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:transparent;color:var(--gold);border-radius:999px;padding:10px 16px;font-family:var(--sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.18s}
.outbtn:hover{border-color:var(--gold)}
.outbtn svg{width:16px;height:16px}

.splash{position:absolute;inset:0;z-index:60;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .8s ease,visibility .8s}
.splash.hide{opacity:0;visibility:hidden}
.splash img{width:192px;filter:drop-shadow(0 10px 30px rgba(0,0,0,.4));animation:rise 1s ease both}
.splash .tag{font-family:var(--serif);font-style:italic;color:var(--gold);font-size:16px;letter-spacing:.04em;animation:rise 1s ease .2s both}
.login{position:absolute;inset:0;z-index:55;background:linear-gradient(180deg,#FBF8F1,#F1EBDC);display:none;flex-direction:column;align-items:center;justify-content:center;padding:34px 26px;text-align:center}
.login.show{display:flex}
.login img{width:96px;margin-bottom:4px}
.login .eyebrow{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);font-weight:500}
.login h2{font-family:var(--serif);font-weight:500;font-size:26px;color:#23302B;margin:8px 0 4px}
.login p{font-size:13px;color:#6B7771;margin-bottom:18px;max-width:280px}
.login input{width:100%;max-width:300px;font-family:var(--sans);font-size:14px;color:#23302B;background:#fff;border:1px solid rgba(42,52,49,.18);border-radius:12px;padding:13px 15px;margin-bottom:10px;font-weight:300}
.login input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(42,52,49,.1)}
.login .btn{width:100%;max-width:300px;border:none;border-radius:12px;padding:14px;font-family:var(--sans);font-size:14px;letter-spacing:.03em;cursor:pointer;background:var(--green);color:var(--ivory);margin-top:4px;box-shadow:0 12px 26px -12px rgba(42,52,49,.5)}
.login .btn.ghost{background:transparent;color:var(--green);border:1px solid rgba(42,52,49,.2);box-shadow:none;margin-top:9px}
.login .skip{margin-top:16px;background:none;border:none;color:var(--gold);font-size:12.5px;cursor:pointer;font-family:var(--sans)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.brandbar{display:flex;justify-content:center;padding:20px 0 6px}
.brandbar .crest{height:84px;opacity:.97}
.greetrow{padding-top:8px;padding-bottom:4px;text-align:center}
.greetrow .greet{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#9aa69d}
.greetrow b{display:block;font-family:var(--serif);font-size:23px;font-weight:500;margin-top:4px}

.searchpill{width:100%;display:flex;align-items:center;gap:11px;background:rgba(244,238,225,.06);border:1px solid var(--line);border-radius:15px;padding:15px 16px;color:#9aa69d;font-family:var(--sans);font-size:14px;cursor:pointer;transition:.18s;margin-top:14px}
.searchpill:hover{border-color:var(--gold)}
.morebtn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(191,177,120,.08);border:1px solid var(--line);border-radius:14px;padding:14px;color:var(--gold);font-family:var(--sans);font-size:13px;letter-spacing:.04em;cursor:pointer;transition:.18s}
.morebtn:hover{background:rgba(191,177,120,.16)}
.morebtn svg{width:16px;height:16px;transform:rotate(90deg)}
.searchpill svg{width:19px;height:19px;color:var(--gold);flex:0 0 auto}
.searchwrap{position:relative}
.searchwrap{position:relative}
.searchwrap>svg{position:absolute;left:15px;top:15px;width:18px;height:18px;color:var(--gold);pointer-events:none}
.searchwrap input{width:100%;background:rgba(244,238,225,.06);border:1px solid var(--line);border-radius:15px;padding:15px 42px 15px 44px;color:var(--ivory);font-family:var(--sans);font-size:14px}
.searchwrap .clr{position:absolute;right:14px;top:13px;background:none;border:none;color:#9aa69d;cursor:pointer;padding:0}
.searchwrap .clr svg{width:18px;height:18px}
.rsticky{position:sticky;top:0;z-index:6;background:var(--green);padding:12px 0 8px;border-bottom:1px solid rgba(191,177,120,.14)}
.toolrow{display:flex;gap:10px;padding:0 22px;align-items:center}
.sortsel{flex:1;background:rgba(244,238,225,.06);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--ivory);font-family:var(--sans);font-size:13px;cursor:pointer}
.sortsel:focus{outline:none;border-color:var(--gold)}
.filterbtn{flex:0 0 auto;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:transparent;color:var(--ivory);border-radius:12px;padding:11px 15px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:.18s}
.filterbtn:hover{border-color:var(--gold)}
.filterbtn.on{border-color:var(--gold);color:var(--gold)}
.filterbtn svg{width:16px;height:16px}
.fcount{background:var(--gold);color:var(--forest);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:500}
.fpanel{padding:8px 22px 6px}
.fgroup{margin-top:0;border-top:1px solid rgba(191,177,120,.12);padding:11px 0 3px}
.fgroup .fl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
.gtoggle{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ivory);cursor:pointer;padding:3px 0}
.gtoggle svg{width:15px;height:15px;color:var(--gold);transform:rotate(90deg);transition:transform .2s}
.gtoggle.open svg{transform:rotate(-90deg)}
.gtoggle.open{color:var(--gold)}
.profrow{display:flex;flex-direction:column;gap:6px;margin:2px 0 6px;padding-bottom:11px;border-bottom:1px solid rgba(191,177,120,.12)}
.profrow .outbtn{align-self:flex-start}
.fchips{display:flex;flex-wrap:wrap;gap:9px}
.fclear{margin-top:16px;font-size:12px;letter-spacing:.06em;color:var(--gold);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.fclear svg{width:14px;height:14px}
.searchwrap input:focus{outline:none;border-color:var(--gold)}
.searchwrap input::placeholder{color:#7d8a82}

.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 14px}
.section-h h2{font-family:var(--serif);font-weight:500;font-size:21px}
.section-h a{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);cursor:pointer}

.hero{position:relative;border-radius:22px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(155deg,#33403b,#1d2724);padding:24px;min-height:206px;display:flex;flex-direction:column;justify-content:flex-end}
.hero .wm{position:absolute;right:-30px;top:-22px;width:200px;opacity:.16}
.hero .eyebrow{margin-bottom:8px}
.hero h3{font-family:var(--serif);font-size:26px;font-weight:500;line-height:1.12;max-width:80%}
.hero p{color:#c7cfc8;font-size:13px;margin-top:8px;font-weight:300;max-width:82%}
.hero .meta{display:flex;gap:16px;margin-top:16px;font-size:12px;color:var(--gold);letter-spacing:.06em}

.chips{display:flex;gap:9px;overflow-x:auto;padding:2px 22px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.qcats{margin-top:16px}
.chip{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;padding:10px 16px;font-size:12px;letter-spacing:.06em;color:#cfd6cf;background:transparent;cursor:pointer;transition:.18s;white-space:nowrap}
.chip:hover{border-color:var(--gold)}
.chip.active{background:var(--gold);color:var(--forest);border-color:var(--gold);font-weight:500}

.rail{display:flex;gap:14px;overflow-x:auto;padding:2px 22px 6px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.rcard{flex:0 0 222px;cursor:pointer}
.rcard.full{flex:1 1 auto;width:100%}
.thumb{position:relative;height:144px;border-radius:18px;overflow:hidden;display:flex;align-items:flex-end;border:1px solid var(--line)}
.thumb .wm{position:absolute;right:-18px;bottom:-20px;width:120px;opacity:.2}
.dish{position:absolute;inset:0;width:100%;height:100%}
.dhead .dish{border-radius:0}
.dhead .dscrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,26,24,.15) 0%,rgba(20,26,24,.05) 45%,rgba(28,36,32,.85) 100%);z-index:1}
.thumb .stars{position:absolute;left:14px;top:12px;color:var(--gold);font-size:13px;letter-spacing:3px;opacity:.7}
.thumb.green{background:linear-gradient(150deg,#33403b,#212b27)}
.thumb.forest{background:linear-gradient(150deg,#243029,#161e1b)}
.thumb.gold{background:linear-gradient(150deg,#8F7F48,#6c5f33)}
.thumb.parch{background:linear-gradient(150deg,#d9cfb4,#b9ac86)}
.badge{position:absolute;top:12px;right:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:999px;font-weight:500}
.b-diet{background:var(--gold);color:var(--forest)}
.b-verif{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.b-comm{background:rgba(244,238,225,.16);color:var(--ivory)}
.rcard h4{font-family:var(--serif);font-size:16px;font-weight:500;margin:11px 0 4px;line-height:1.2}
.rcard .sub{font-size:12px;color:#9aa69d;display:flex;gap:10px;letter-spacing:.04em;align-items:center}
.rcard .sub .dot{color:var(--gold)}
.list{display:flex;flex-direction:column;gap:18px;padding:0 22px}

.detail{position:absolute;inset:0;z-index:50;background:var(--green);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .34s ease}
.detail.open{transform:none}
.detail .scr{flex:1;overflow-y:auto;scrollbar-width:none}
.detail .scr::-webkit-scrollbar{display:none}
.dhead{position:relative;height:280px;display:flex;align-items:flex-end;padding:22px}
.dhead .wm{position:absolute;right:-30px;top:-10px;width:240px;opacity:.18}
.circ-btn{position:absolute;top:18px;width:44px;height:44px;border-radius:50%;background:rgba(20,26,24,.55);backdrop-filter:blur(6px);border:1px solid var(--line);color:var(--ivory);display:grid;place-items:center;cursor:pointer;z-index:2}
.circ-btn svg{width:20px;height:20px}
.dhead .back{left:18px}
.dhead .fav{right:18px;color:var(--gold)}
.dhead .fav.on{background:var(--gold);color:var(--forest);border-color:var(--gold)}
.dhead .fav.on svg{fill:currentColor}
.dtitle{position:relative;z-index:2}
.dtitle .badge{position:static;display:inline-block;margin-bottom:12px}
.dtitle h1{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1.08;margin-top:6px}
.dbody{background:var(--ivory);color:var(--green);border-radius:26px 26px 0 0;margin-top:-22px;position:relative;z-index:3;padding:26px 22px 30px}
.metric-row{display:flex;justify-content:space-between;text-align:center;border:1px solid rgba(42,52,49,.14);border-radius:16px;padding:16px 6px;margin-bottom:22px}
.metric{flex:1}
.metric b{display:block;font-family:var(--serif);font-size:18px;color:var(--green)}
.metric span{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#7d8478}
.metric+.metric{border-left:1px solid rgba(42,52,49,.12)}
.dbody h3{font-family:var(--serif);font-size:18px;margin:24px 0 12px;color:var(--green)}
.dbody p.lead{color:#54605a;font-size:14px;line-height:1.7;font-weight:300}
.ing{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(42,52,49,.1);font-size:14px}
.ing span:last-child{color:var(--antique);font-weight:500}
.step{display:flex;gap:14px;padding:11px 0}
.step .n{flex:0 0 28px;height:28px;border-radius:50%;background:var(--green);color:var(--gold);font-family:var(--serif);display:grid;place-items:center;font-size:14px}
.step p{font-size:14px;line-height:1.6;color:#3c463f;padding-top:3px}
.tagline{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.fit{font-size:12px;padding:7px 12px;border-radius:999px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px}
.fit svg{width:13px;height:13px}
.fit.ok{background:rgba(143,127,72,.14);color:var(--antique)}
.fit.no{background:rgba(150,60,40,.12);color:#9a4a30}
.warn{display:flex;gap:12px;align-items:flex-start;background:rgba(143,127,72,.1);border:1px solid rgba(143,127,72,.3);border-radius:14px;padding:14px 16px;margin-top:16px}
.warn .i svg{width:22px;height:22px;color:var(--antique)}
.warn p{font-size:12.5px;color:#5b5436;line-height:1.55}
.warn.danger{background:rgba(150,60,40,.1);border-color:rgba(150,60,40,.35)}
.warn.danger .i svg{color:#9a4a30}
.warn.danger p{color:#7a3320}
.status-pill{display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(191,177,120,.18);color:var(--antique);font-weight:500}
.comment{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid rgba(42,52,49,.1)}
.comment .av{width:34px;height:34px;border-radius:50%;background:var(--green);color:var(--gold);display:grid;place-items:center;font-family:var(--serif);font-size:14px;flex:0 0 auto}
.comment b{font-size:13px;color:var(--green)}
.comment small{color:#8a9189;font-size:11px;margin-left:6px}
.comment p{font-size:13px;color:#54605a;line-height:1.5;margin-top:3px}
.cbox{display:flex;gap:10px;margin-top:14px}
.cbox input{flex:1;background:#fff;border:1px solid rgba(42,52,49,.18);border-radius:12px;padding:12px 14px;font-family:var(--sans);font-size:13px;color:var(--green)}
.cbox input:focus{outline:none;border-color:var(--antique)}
.cbox button{flex:0 0 auto;width:46px;border-radius:12px;border:none;background:var(--green);color:var(--gold);cursor:pointer;display:grid;place-items:center}
.cbox button svg{width:18px;height:18px}
.disclaim{font-size:11px;color:#8a9189;text-align:center;margin-top:26px;line-height:1.6;font-weight:300}

.profhead{background:linear-gradient(160deg,#2f3b36,#1c2522);padding:26px 22px 24px;text-align:center;position:relative}
.profhead .crest{height:90px;margin:0 auto 8px}
.profhead h2{font-family:var(--serif);font-size:22px;font-weight:500}
.profhead p{color:#9aa69d;font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
.dogcard{background:rgba(244,238,225,.05);border:1px solid var(--line);border-radius:20px;padding:18px 44px 18px 18px;display:flex;gap:16px;align-items:center;position:relative}
.dogedit{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--gold);display:grid;place-items:center;cursor:pointer}
.dogedit svg{width:15px;height:15px}
.linkdel{background:none;border:none;color:#b25a3e;cursor:pointer;font-family:var(--sans);font-size:12px;display:inline-flex;align-items:center;gap:5px;letter-spacing:.04em}
.linkdel svg{width:13px;height:13px}
.ctx{display:inline-flex;align-items:center;gap:9px;background:rgba(191,177,120,.16);color:var(--gold);border-radius:999px;padding:8px 8px 8px 15px;font-size:12.5px;letter-spacing:.03em;margin:2px 22px 0}
.ctx button{background:var(--gold);color:var(--forest);border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;display:grid;place-items:center}
.ctx button svg{width:13px;height:13px}
.dogcard .ava{width:60px;height:60px;border-radius:50%;background:linear-gradient(150deg,#8F7F48,#6c5f33);display:grid;place-items:center;font-family:var(--serif);font-size:24px;color:var(--ivory);flex:0 0 auto}
.dogcard .ava svg{width:24px;height:24px}
.dogcard h4{font-family:var(--serif);font-size:18px;font-weight:500}
.dogcard .tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.dogcard .tags em{font-style:normal;font-size:11px;background:rgba(191,177,120,.16);color:var(--gold);padding:4px 9px;border-radius:999px;letter-spacing:.02em}
.dogmeta{font-size:12px;color:#9aa69d;margin-top:8px;font-weight:300;line-height:1.5}
.dognote{font-family:var(--serif);font-style:italic;color:#cfd6cf;font-size:13.5px;line-height:1.5;margin-top:11px;padding-left:12px;border-left:2px solid var(--gold)}
.jentry{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid rgba(191,177,120,.12)}
.jentry .dot{flex:0 0 7px;height:7px;border-radius:50%;background:var(--gold);margin-top:7px}
.jentry .jt{font-size:13.5px;color:#dfe4de;line-height:1.5;font-weight:300}
.jentry small{color:#8a9189;font-size:11px;display:block;margin-top:4px;letter-spacing:.04em}
.jbox{display:flex;gap:10px;margin-top:14px;margin-bottom:6px}
.jbox input{flex:1;background:rgba(244,238,225,.06);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ivory);font-family:var(--sans);font-size:13px}
.jbox input:focus{outline:none;border-color:var(--gold)}
.jbox input::placeholder{color:#6f7a72}
.jbox button{flex:0 0 auto;width:46px;border-radius:12px;border:1px solid var(--line);background:transparent;color:var(--gold);cursor:pointer;display:grid;place-items:center}
.jbox button svg{width:18px;height:18px}
.jtoggle{display:inline-flex;align-items:center;gap:7px;color:var(--gold);font-size:12px}
.jtoggle svg{width:16px;height:16px;transform:rotate(90deg);transition:transform .2s}
.jtoggle.open svg{transform:rotate(-90deg)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:rgba(244,238,225,.06);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--ivory);font-family:var(--sans);font-size:14px}
.field textarea{resize:vertical;min-height:84px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:#6f7a72}
.row2{display:flex;gap:12px}.row2 .field{flex:1}
.checkrow{display:flex;align-items:center;gap:11px;cursor:pointer;margin:4px 0 18px}
.checkrow .box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;color:transparent;flex:0 0 auto;transition:.15s}
.checkrow .box svg{width:14px;height:14px}
.checkrow.on .box{background:var(--gold);border-color:var(--gold);color:var(--forest)}
.checkrow span{font-size:13px;color:#c7cfc8;font-weight:300}

function norm(s){return (s||'').toLowerCase().replace(/[ąàá]/g,'a').replace(/ć/g,'c').replace(/[ęèé]/g,'e').replace(/ł/g,'l').replace(/ń/g,'n').replace(/[óòô]/g,'o').replace(/ś/g,'s').replace(/[źż]/g,'z');}
function findRecipe(id){return RECIPES.find(x=>x.id===id)||state.myRecipes.find(x=>x.id===id);}
function checkRisk(r){const hits=[];r.ing.forEach(i=>{const n=(i[0]||'').toLowerCase();RISK.forEach(w=>{if(n.includes(w)&&!hits.includes(i[0]))hits.push(i[0]);});});return hits;}
function dogAvoid(dog){return [].concat(dog&&dog.allergens||[],dog&&dog.forbidden||[]).map(s=>(s||'').toLowerCase());}
function recipeMatchesDog(r,dog){
  if(!dog)return true;
  for(const a of dogAvoid(dog)){
    if(!a)continue;
    for(const [term,flag] of AVOIDMAP){if(a.includes(term)&&!r.flags.includes(flag))return false;}
    if(a.includes('kurcz')&&r.flags.includes('poultry'))return false;
    if(r.ing.some(i=>(i[0]||'').toLowerCase().includes(a)))return false;
  }
  return true;
}
function dogProfileFlags(dog){
  if(!dog)return [];
  const f=[];
  for(const a of dogAvoid(dog)){for(const [term,flag] of AVOIDMAP){if(a.includes(term)&&!f.includes(flag))f.push(flag);}}
  const w=parseInt(dog.weight,10);
  if(w){f.push(w<10?'s_male':(w<=25?'s_srednie':'s_duze'));}
  if((dog.activity||'').toLowerCase().includes('wysok'))f.push('g_aktywne');
  if((dog.goal||'').toLowerCase().includes('senior'))f.push('a_senior');
  if((dog.goal||'').toLowerCase().includes('redukcj'))f.push('g_nadwaga');
  return f;
}
function catMatch(r,c){return c==='all'||r.flags.includes(c)||r.cat===c;}
const AVOIDMAP=[['kurcz','bez_kurczak'],['wolow','bez_wolowina'],['ryb','bez_ryba'],['jaj','bez_jajko'],['nabia','bez_nabial'],['mlek','bez_nabial'],['lakto','bez_nabial'],['zbo','bez_zboz'],['gluten','bez_gluten'],['ryż','bez_ryz'],['ryz','bez_ryz']];
function passFilters(r){
  for(const f of state.flags){
    if(f==='diet'){if(r.badge!=='diet')return false;}
    else if(f==='verif'){if(r.badge!=='verif')return false;}
    else if(f==='comm'){if(r.badge!=='comm')return false;}
    else if(f==='easy'){if(r.diff!=='Łatwy')return false;}
    else if(f==='quick'){if(parseInt(r.time,10)>30)return false;}
    else if(!r.flags.includes(f))return false;
  }
  return true;
}

async function saveRecipe(){
  const v=id=>($(id)?$(id).value.trim():'');
  if(!state.user){toast('Zaloguj się, aby dodać przepis');return;}
  if(!v('r_name')){toast('Podaj nazwę przepisu');return;}
  const keys=[...document.querySelectorAll('#addtags .achip.active')].map(b=>b.dataset.k);
  if(!keys.some(k=>k.indexOf('m_')===0)){toast('Wybierz przynajmniej jeden rodzaj posiłku');return;}
  if(!keys.some(k=>k.indexOf('i_')===0)){toast('Wybierz główny składnik');return;}
  if(!$('r_consent').classList.contains('on')){toast('Zaznacz zgodę na publikację');return;}
  const ing=v('r_ing').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{const p=l.split(/\s[-\u2013]\s/);return [p[0]||l,p[1]||''];});
  const steps=v('r_steps').split('\n').map(s=>s.trim()).filter(Boolean);
  try{
    const {data:rec,error}=await sb.from('recipes').insert({author_id:state.user.id,title:v('r_name'),description:v('r_desc')||null,difficulty:v('r_diff')||'easy',time_min:parseInt(v('r_time'))||null,kcal:parseInt(v('r_kcal'))||null}).select().single();
    if(error){toast('Błąd: '+error.message);return;}
    if(ing.length)await sb.from('recipe_ingredients').insert(ing.map((x,i)=>({recipe_id:rec.id,position:i,name:x[0],amount:x[1]})));
    if(steps.length)await sb.from('recipe_steps').insert(steps.map((b,i)=>({recipe_id:rec.id,position:i,body:b})));
    const {data:tg}=await sb.from('tags').select('id').in('key',keys);
    if(tg&&tg.length)await sb.from('recipe_tags').insert(tg.map(t=>({recipe_id:rec.id,tag_id:t.id})));
    const {error:se}=await sb.rpc('submit_recipe',{p_recipe:rec.id});
    await loadMine();await loadPending();
    go('profile');
    toast(se?('Zapisano szkic. '+se.message):'Wysłano do akceptacji ✓');
  }catch(e){toast('Błąd zapisu: '+(e.message||e));}
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekDates(){const now=new Date();const off=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(now.getDate()-off);const out=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(fmtDate(d));}return out;}
const DAYNAMES={Pon:'poniedziałek',Wt:'wtorek','Śr':'środę',Czw:'czwartek',Pt:'piątek',Sob:'sobotę',Niedz:'niedzielę'};
async function loadPlan(){
  state.plan=[['Pon',null],['Wt',null],['Śr',null],['Czw',null],['Pt',null],['Sob',null],['Niedz',null]];
  if(!state.user||!sb)return;
  const dates=weekDates();
  const {data}=await sb.from('meal_plan_entries').select('plan_date,recipe_id').eq('owner_id',state.user.id).gte('plan_date',dates[0]).lte('plan_date',dates[6]);
  (data||[]).forEach(e=>{const idx=dates.indexOf(e.plan_date);if(idx>=0)state.plan[idx][1]=e.recipe_id;});
}
async function loadShop(){
  state.shop=[];
  if(!state.user||!sb)return;
  const {data}=await sb.from('shopping_items').select('id,label,is_custom,checked').eq('owner_id',state.user.id).order('created_at');
  state.shop=data||[];
}
async function addToPlan(id){
  if(!state.user){toast('Zaloguj się, aby planować');return;}
  const i=state.plan.findIndex(p=>p[1]===null);
  if(i<0){toast('Plan na ten tydzień jest pełny');return;}
  state.plan[i][1]=id;
  if(state.tab==='planner')render();
  toast('Dodano do planera na '+(DAYNAMES[state.plan[i][0]]||state.plan[i][0]));
  const dates=weekDates();
  try{await sb.from('meal_plan_entries').delete().eq('owner_id',state.user.id).eq('plan_date',dates[i]).eq('position',0);
  await sb.from('meal_plan_entries').insert({owner_id:state.user.id,plan_date:dates[i],position:0,recipe_id:id});}catch(e){}
}
async function clearPlanDay(d){
  const i=state.plan.findIndex(x=>x[0]===d);if(i<0)return;

async function addShop(){
  const i=$('shopInput');if(!i||!i.value.trim())return;
  if(!state.user){toast('Zaloguj się, aby zapisać listę');return;}
  const label=i.value.trim();
  try{const {data,error}=await sb.from('shopping_items').insert({owner_id:state.user.id,label,is_custom:true,checked:false}).select().single();if(error){toast('Błąd: '+error.message);return;}if(data)state.shop.push(data);}catch(e){toast('Błąd: '+(e.message||e));return;}

async function toggleShop(id){
  const it=(state.shop||[]).find(x=>x.id===id);if(!it)return;

async function removeShop(id){
  state.shop=(state.shop||[]).filter(x=>x.id!==id);render();

async function generateShop(){
  if(!state.user){toast('Zaloguj się, aby zapisać listę');return;}
  const names=new Set();
  state.plan.forEach(([d,id])=>{if(id){const r=findRecipe(id);if(r&&r.ing)r.ing.forEach(x=>names.add(x[0]));}});
  if(!names.size){toast('Najpierw zaplanuj posiłki');return;}
  const existing=new Set((state.shop||[]).map(s=>s.label.toLowerCase()));
  const toAdd=[...names].filter(n=>!existing.has(n.toLowerCase()));
  if(!toAdd.length){toast('Lista jest już aktualna');return;}
  try{const {data,error}=await sb.from('shopping_items').insert(toAdd.map(label=>({owner_id:state.user.id,label,is_custom:false,checked:false}))).select();if(error){toast('Błąd: '+error.message);return;}if(data)state.shop.push(...data);}catch(e){toast('Błąd: '+(e.message||e));return;}
  render();toast('Dodano składniki z planu');
}

  const sc=$('screen');
  const keep=(state.tab===lastTab);
  const y=sc?sc.scrollTop:0;
  sc.innerHTML=VIEWS[state.tab]();
  renderNav();
  sc.style.scrollBehavior='auto';
  sc.scrollTop=keep?y:0;
  sc.style.scrollBehavior='';
  lastTab=state.tab;
}
function go(t){state.tab=t;render();}
function goCat(c){state.tab='recipes';state.cat=c;state.q='';render();}
function goSearch(){state.tab='recipes';render();const s=$('search');if(s)s.focus();}
function homeSearch(v){state.q=v;state.tab='recipes';render();const s=$('search');if(s){s.focus();s.setSelectionRange(v.length,v.length);}}
function goFilters(){state.tab='recipes';state.showFilters=true;render();}
function setCat(c){state.cat=c;render();}
function setSort(v){state.sort=v;render();}
function showMore(){state.shown+=PAGE;render();}
function toggleFilters(){state.showFilters=!state.showFilters;state.showCats=false;render();}
function toggleCats(){state.showCats=!state.showCats;state.showFilters=false;render();}
function toggleGroup(g){state.openGroups.has(g)?state.openGroups.delete(g):state.openGroups.add(g);render();}
function pickCat(c){state.cat=c;state.showCats=false;render();}
function catLabel(c){for(const[g,items]of CATGROUPS){for(const[k,l]of items){if(k===c)return l;}}const m=MEALCATS.find(x=>x[0]===c);return m?m[1]:c;}
function groupPanel(groups,kind){
  return groups.map(([g,items])=>{
    const open=state.openGroups.has(g);
    const chips=items.map(([k,l])=>{const active=kind==='cat'?state.cat===k:state.flags.has(k);const fn=kind==='cat'?`pickCat('${k}')`:`toggleFlag('${k}')`;return `<button class="chip ${active?'active':''}" onclick="${fn}">${l}</button>`;}).join('');
    return `<div class="fgroup"><div class="gtoggle ${open?'open':''}" onclick="toggleGroup('${g}')">${g} ${ico('chev')}</div>${open?`<div class="fchips" style="margin-top:10px">${chips}</div>`:''}</div>`;
  }).join('');
}
function setProfileFilters(){const d=state.dogs[0];if(!d)return;state.flags=new Set(dogProfileFlags(d));state.dogMatch=true;state.cat='all';state.q='';}
function applyProfile(){setProfileFilters();render();toast(state.dogs[0]?('Dopasowano do '+state.dogs[0].name):'');}
function clearFilters(){state.flags.clear();state.q='';state.cat='all';state.sort='rec';state.dogMatch=false;render();}
function setQ(v){state.q=v;render();const s=$('search');if(s){s.focus();s.setSelectionRange(v.length,v.length);}}
function toggleFlag(f){state.flags.has(f)?state.flags.delete(f):state.flags.add(f);render();}
function renderNav(){
  const ak=state.tab==='add'?'recipes':state.tab;
  const items=[['home','home','Start'],['recipes','book','Przepisy'],['planner','calendar','Planer'],['community','users','Społeczność'],['profile','user','Profil']];
  $('nav').innerHTML=items.map(([k,i,l])=>`<button class="${ak===k?'active':''}" onclick="go('${k}')"><span class="dot"></span>${ico(i)}<span>${l}</span></button>`).join('');
}

function openRecipe(id){
  const r=findRecipe(id);if(!r)return;const fav=state.favs.has(id);
  const [bc,bt]=BADGE[r.badge];
  const risky=checkRisk(r);
  const cms=state.comments[id]||[];
  $('detailScr').innerHTML=`
    <div class="dhead thumb ${r.wash}" style="border:none;border-radius:0">
      <div class="dscrim"></div>
      <img src="${r.wash==='gold'||r.wash==='parch'?MONOG:MONO}" alt="" style="position:absolute;top:64px;right:20px;width:104px;opacity:.13;z-index:1;pointer-events:none">
      <div class="circ-btn back" onclick="closeRecipe()" aria-label="Wróć">${ico('arrow')}</div>
      <div class="circ-btn fav ${fav?'on':''}" id="favBtn" onclick="toggleFav('${id}')" aria-label="Ulubione">${ico('heart')}</div>
      <div class="dtitle"><span class="badge ${bc}">${bt}</span><div class="eyebrow">${CATS.find(c=>c[0]===r.cat)?CATS.find(c=>c[0]===r.cat)[1]:'Przepis'}</div><h1>${r.name}</h1></div>
    </div>
    <div class="dbody">
      ${r.status==='pending'?`<div style="text-align:center;margin-bottom:16px"><span class="status-pill">Oczekuje na akceptację</span></div>`:''}
      <div class="metric-row">
        <div class="metric"><b>${r.time.split(' ')[0]}</b><span>${/min/.test(r.time)?'minut':'czas'}</span></div>
        <div class="metric"><b>${r.diff}</b><span>Trudność</span></div>
        <div class="metric"><b>${r.kcal.split(' ')[0]}</b><span>kcal</span></div>
        <div class="metric"><b>${star}${r.rating}</b><span>Ocena</span></div>
      </div>
      <p class="lead">${r.desc}</p>
      <h3>Składniki <span style="font-size:12px;color:#8a9189;font-family:var(--sans)">· ${r.portion}</span></h3>
      ${r.ing.map(i=>`<div class="ing"><span>${i[0]}</span><span>${i[1]}</span></div>`).join('')}
      <h3>Przygotowanie</h3>
      ${r.steps.map((s,n)=>`<div class="step"><div class="n">${n+1}</div><p>${s}</p></div>`).join('')}
      ${(r.good&&r.good.length)||(r.bad&&r.bad.length)?`<h3>Dla jakich psów</h3>
      <div class="tagline">${(r.good||[]).map(g=>`<span class="fit ok">${ico('check')} ${g}</span>`).join('')}</div>
      <div class="tagline" style="margin-top:8px">${(r.bad||[]).map(b=>`<span class="fit no">${ico('x')} ${b}</span>`).join('')}</div>`:''}
      ${r.warn?`<div class="warn"><span class="i">${ico('warn')}</span><p>${r.warn}</p></div>`:''}
      ${risky.length?`<div class="warn danger"><span class="i">${ico('warn')}</span><p>Automatyczne ostrzeżenie: wykryto składnik wymagający ostrożności (${risky.join(', ')}). Sprawdź, czy jest bezpieczny dla Twojego psa.</p></div>`:''}
      <button class="btn btn-gold" style="width:100%;margin-top:22px" onclick="addToPlan('${id}')">Dodaj do planera</button>
      <h3>Twoja ocena</h3>
      <div class="rate">${[1,2,3,4,5].map(n=>`<button type="button" class="rstar ${(state.myRatings&&state.myRatings[id]>=n)?'on':''}" onclick="rateRecipe('${id}',${n})" aria-label="${n} gwiazdek">${star}</button>`).join('')}</div>
      <h3>Komentarze</h3>
      ${cms.length?cms.map(c=>`<div class="comment"><div class="av">${c.who[0]}</div><div><b>${c.who}</b><small>${c.when}</small><p>${c.text}</p></div></div>`).join(''):'<p class="muted" style="color:#8a9189">Brak komentarzy. Bądź pierwszy.</p>'}
      <div class="cbox"><input id="cInput" placeholder="Napisz komentarz…" onkeydown="if(event.key==='Enter')addComment('${id}')"><button onclick="addComment('${id}')" aria-label="Wyślij">${ico('send')}</button></div>
      <p class="disclaim">Wartości odżywcze i porcje są orientacyjne i nie zastępują konsultacji z lekarzem weterynarii ani dietetykiem zwierzęcym.</p>
    </div>`;
  $('detail').classList.add('open');
}
function closeRecipe(){$('detail').classList.remove('open');}
async function toggleFav(id){
  if(!state.user){toast('Zaloguj się, aby zapisywać ulubione');return;}
  const had=state.favs.has(id);
  had?state.favs.delete(id):state.favs.add(id);
  const b=$('favBtn');if(b)b.classList.toggle('on',state.favs.has(id));
  render();
  toast(had?'Usunięto z ulubionych':'Dodano do ulubionych');
  try{if(had){await sb.from('favorites').delete().eq('recipe_id',id);}else{await sb.from('favorites').insert({user_id:state.user.id,recipe_id:id});}}catch(e){}
}
async function addComment(id){
  const inp=$('cInput');if(!inp||!inp.value.trim())return;
  if(!state.user){toast('Zaloguj się, aby komentować');return;}
  const text=inp.value.trim();
  try{const {error}=await sb.from('comments').insert({recipe_id:id,author_id:state.user.id,body:text});if(error){toast('Błąd: '+error.message);return;}}catch(e){toast('Błąd: '+(e.message||e));return;}
  const who=(state.profile&&state.profile.display_name)||'Ty';
  (state.comments[id]=state.comments[id]||[]).push({who,text,when:'teraz'});
  openRecipe(id);toast('Dodano komentarz');
}
async function rateRecipe(id,n){
  if(!state.user){toast('Zaloguj się, aby ocenić');return;}
  try{const {error}=await sb.from('ratings').upsert({recipe_id:id,user_id:state.user.id,stars:n},{onConflict:'recipe_id,user_id'});if(error){toast('Błąd: '+error.message);return;}}catch(e){toast('Błąd: '+(e.message||e));return;}
  state.myRatings=state.myRatings||{};state.myRatings[id]=n;
  try{const {data}=await sb.from('recipes').select('rating_avg').eq('id',id).single();const r=findRecipe(id);if(r&&data&&data.rating_avg!=null)r.rating=Math.round(data.rating_avg*10)/10;}catch(e){}
  openRecipe(id);toast('Dziękujemy za ocenę!');
}

setTimeout(()=>{$('splash').classList.add('hide');start();},2100);
</script>
</body>
</html>
